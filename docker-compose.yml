version: '3.8'

services:
  database:
    image: postgres:15
    container_name: lms_database
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=simple_lms_db
      - POSTGRES_USER=lms_user
      - POSTGRES_PASSWORD=lms_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms_user -d simple_lms_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lms-network

  web:
    build: .
    container_name: simple_lms
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - SECRET_KEY=django-insecure-development-key
      - DB_NAME=simple_lms_db
      - DB_USER=lms_user
      - DB_PASSWORD=lms_password
      - DB_HOST=database
      - DB_PORT=5432
    depends_on:
      database:
        condition: service_healthy
    networks:
      - lms-network

volumes:
  postgres_data:

networks:
  lms-network:
    driver: bridge
